services:
  minecraft-telegram-bot:
    container_name: minecraft-telegram-bot
    image: ${DOCKER_REPO}/minecraft-telegram-bot:${VERSION}
    pull_policy: if_not_present
    restart: always
    ports:
      - "${BOT_LISTEN_PORT}:8080"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      WEBHOOK_SHARED_SECRET: ${WEBHOOK_SHARED_SECRET}
      BOT_LISTEN_PORT: 8080
    volumes:
      - ./data:/app/data
    networks:
      - minecraft_bot_network

volumes:
  data:

networks:
  minecraft_bot_network:
