name: Lint, Detect, Test Build

on:
  push:
    branches:
      - '*'

jobs:
  lint:
    name: Python lint TELEGRAM-BOT
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      PYTHON_VERSION: '3.11'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 mypy aiohttp beautifulsoup4 requests
          pip install types-beautifulsoup4 types-requests

      - name: Run flake8 (style guide enforcement)
        run: flake8 . --count --show-source --statistics

      - name: Run mypy (static type checking)
        run: mypy --install-types --non-interactive .

  detect-secrets:
    name: Scanning for secrets in code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  build_deploy:
    name: Build, push and deploy
    needs: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get short SHA
        id: get-short-sha
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Forming docker-compose file
        env:
          DOCKER_REPO: ${{ vars.DOCKER_REPO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          WEBHOOK_SHARED_SECRET: ${{ secrets.WEBHOOK_SHARED_SECRET }}
          BOT_LISTEN_PORT: ${{ vars.BOT_LISTEN_PORT }}
        run: |
          BOT_LISTEN_PORT="${BOT_LISTEN_PORT:-18080}"
          sed -e "s/\${VERSION}/$SHORT_SHA/g" \
              -e "s/\${DOCKER_REPO}/$DOCKER_REPO/g" \
              -e "s/\${TELEGRAM_BOT_TOKEN}/$TELEGRAM_BOT_TOKEN/g" \
              -e "s/\${TELEGRAM_CHAT_ID}/$TELEGRAM_CHAT_ID/g" \
              -e "s/\${WEBHOOK_SHARED_SECRET}/$WEBHOOK_SHARED_SECRET/g" \
              -e "s/\${BOT_LISTEN_PORT}/$BOT_LISTEN_PORT/g" \
              docker-compose.template.yaml > docker-compose.yaml
      
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        working-directory: ./
        run: |
          docker build -t ${{ vars.DOCKER_REPO }}/minecraft-telegram-bot:$SHORT_SHA .
          docker push ${{ vars.DOCKER_REPO }}/minecraft-telegram-bot:$SHORT_SHA

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      
      - name: Copy docker-compose.yaml to server
        run: |
          scp -o StrictHostKeyChecking=no -P ${{ vars.DEPLOY_SSH_PORT }} ./docker-compose.yaml ${{ vars.DEPLOY_SSH_USERNAME }}@${{ vars.DEPLOY_SSH_HOST }}:/srv/minecraft-telegram-bot

      - name: SSH to server and deploy
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ vars.DEPLOY_SSH_PORT }} ${{ vars.DEPLOY_SSH_USERNAME }}@${{ vars.DEPLOY_SSH_HOST }} << EOF
            cd /srv/minecraft-telegram-bot
            sudo docker pull ${{ vars.DOCKER_REPO }}/minecraft-telegram-bot:$SHORT_SHA
            export TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
            export WEBHOOK_SHARED_SECRET="${{ secrets.WEBHOOK_SHARED_SECRET }}"
            sudo --preserve-env=TELEGRAM_BOT_TOKEN,WEBHOOK_SHARED_SECRET docker compose down
            sudo --preserve-env=TELEGRAM_BOT_TOKEN,WEBHOOK_SHARED_SECRET docker compose up -d
            sudo docker system prune -f
            sudo docker image prune -a -f
          EOF
